<section class="container my-5">

    <h1 class="mb-4">
        تواصل معنا
    </h1>

    <div id="alertBox"></div>

    <form id="contactForm">

        <div class="mb-3">

            <label class="form-label">
                الاسم
            </label>

            <input
                type="text"
                id="name"
                class="form-control">

        </div>

        <div class="mb-3">

            <label class="form-label">
                البريد الإلكتروني
            </label>

            <input
                type="email"
                id="email"
                class="form-control">

        </div>

        <div class="mb-3">

            <label class="form-label">
                الرسالة
            </label>

            <textarea
                id="message"
                rows="5"
                class="form-control"></textarea>

        </div>

        <button
            type="submit"
            class="btn btn-primary">

            إرسال

        </button>

    </form>

</section>

<section class="container my-5">

    <div class="card">

        <div class="card-body">

            <h4>
                معلومات التواصل
            </h4>

            <p>
                📧 info@university-events.com
            </p>

            <p>
                📱 +963 999 999 999
            </p>

            <p>
                🌐 Facebook | Instagram | LinkedIn
            </p>

    </div>

</section>

<footer class="bg-dark text-white text-center p-4">

    <p>
        © 2026 دليل فعاليات الجامعة الافتراضية
    </p>

</footer>

<script>

const form = document.getElementById("contactForm");

form.addEventListener("submit", function(e){

    e.preventDefault();

    const name =
        document.getElementById("name").value.trim();

    const email =
        document.getElementById("email").value.trim();

    const message =
        document.getElementById("message").value.trim();

    const alertBox =
        document.getElementById("alertBox");

    const emailPattern =
        /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(
        name === "" ||
        email === "" ||
        message === ""
    ){

        alertBox.innerHTML = `
        <div class="alert alert-danger">
        جميع الحقول مطلوبة
        </div>
        `;

        return;
    }

    if(!emailPattern.test(email)){

        alertBox.innerHTML = `
        <div class="alert alert-warning">
        البريد الإلكتروني غير صالح
        </div>
        `;

        return;
    }

    alertBox.innerHTML = `
    <div class="alert alert-success">
    تم إرسال الرسالة بنجاح
    </div>
    `;

    form.reset();

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
